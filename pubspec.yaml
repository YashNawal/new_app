name: borrow_manager
description: A new Flutter project for managing borrows.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  intl: ^0.18.1
  sqflite: ^2.3.0
  path: ^1.8.3
  image_picker: ^1.0.4
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  provider: ^6.1.1
  url_launcher: ^6.2.5
  google_sign_in: ^6.2.1
  googleapis: ^11.4.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.1
  path_provider: ^2.1.2
  email_otp: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
